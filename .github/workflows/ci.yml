name: CI - Generate & Run JUnit Tests

on:
  push:
    branches: [ "main", "lab5-generation", "ai-version-1", "ai-version-2", "ai-version-3" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-generation-and-execution:
    runs-on: ubuntu-latest
    steps:
    # 1. Получение кода
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Настройка среды Python для генератора
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Python dependencies
      run: pip install pyyaml

    # 3. Генерация тестов из спецификации
    - name: Generate JUnit tests
      run: python generator/gen_tests.py --config config.yaml

    # 4. Настройка Java
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    # 5. Восстановление пакетов и сборка
    - name: Build with Maven
      run: mvn clean compile

    # 6. Запуск тестов (включая сгенерированные)
    - name: Run Tests
      run: mvn test

    # 7. Сохранение результатов в артефакты
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: junit-test-results
        path: |
          target/surefire-reports/
          target/test-results/