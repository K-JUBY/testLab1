name: Java CI Pipeline (JUnit 5)
on:
  push:
    branches: [ "main", "lab5-generation", "ai-version-1", "ai-version-2", "ai-version-3" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: pip install pyyaml

    - name: Generate JUnit tests
      run: python generator/gen_tests.py --config config.yaml

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build and Test with Maven
      run: mvn clean test