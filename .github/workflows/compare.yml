name: Comparative Test Report
on:
workflow_dispatch:

jobs:
test-ai-v1:
name: Test AI Version 1 (Kimi)
runs-on: ubuntu-latest
steps:
  - uses: actions/checkout@v4
with:
ref: ai-version-1
  - uses: actions/setup-java@v3
with:
java-version: '17'
distribution: 'temurin'
cache: maven
  - run: mvn clean test

test-ai-v2:
name: Test AI Version 2 (GPT4o-mini)
runs-on: ubuntu-latest
steps:
  - uses: actions/checkout@v4
with:
ref: ai-version-2
  - uses: actions/setup-java@v3
with:
java-version: '17'
distribution: 'temurin'
cache: maven
  - run: mvn clean test

test-ai-v3:
name: Test AI Version 3 (deepseek)
runs-on: ubuntu-latest
steps:
  - uses: actions/checkout@v4
with:
ref: ai-version-3
  - uses: actions/setup-java@v3
with:
java-version: '17'
distribution: 'temurin'
cache: maven
  - run: mvn clean test