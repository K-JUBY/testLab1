module: RomanNumeralConverter
# Трассировка нефункциональных требований
non_functional_requirements:
  - id: NFR-1
    desc: "Модуль не должен использовать внешние базы данных или API."
  - id: NFR-2
    desc: "Все методы модуля не имеют состояния (stateless)."
methods:
  - name: toRoman
    req_functional: ["1"]
    req_non_functional: ["NFR-1", "NFR-2"]
    signature: "String toRoman(int number)"
    pre: "number >= 1 && number <= 3999"
    post: "Возвращает строку с корректным римским числом."
    equivalence_classes:
      - case: "Минимальное допустимое значение"
        inputs: [1]
        expected: "I"
      - case: "Среднее значение"
        inputs: [58]
        expected: "LVIII"
      - case: "Отрицательное число (нарушение pre)"
        inputs: [-5]
        expected: "IllegalArgumentException"

  - name: toArabic
    req_functional: ["2"]
    req_non_functional: ["NFR-1", "NFR-2"]
    signature: "int toArabic(String roman)"
    pre: "roman - корректная строка римского числа"
    post: "Возвращает целое число от 1 до 3999."
    equivalence_classes:
      - case: "Корректное большое число"
        inputs: ["MCMXCIV"]
        expected: "1994"
      - case: "Пустая строка (нарушение pre)"
        inputs: [""]
        expected: "IllegalArgumentException"